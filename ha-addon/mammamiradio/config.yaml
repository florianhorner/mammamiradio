name: Mamma Mi Radio
description: AI-powered Italian radio station — two AI hosts banter, react to your home, and play CC-licensed music (Jamendo), live charts, or local files. Real radio feel, no subscriptions.
slug: mammamiradio
version: 2.12.2
stage: experimental
url: https://github.com/florianhorner/mammamiradio
image: ghcr.io/florianhorner/mammamiradio-addon-{arch}
arch:
  - amd64
  - aarch64
init: false
timeout: 240
healthcheck: http://[HOST]:[PORT:8000]/healthz
host_network: true
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8000
panel_icon: mdi:radio
panel_title: Mamma Mi Radio
ports:
  8000/tcp: null
