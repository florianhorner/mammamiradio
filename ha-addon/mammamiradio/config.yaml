name: Mamma Mi Radio
description: AI-powered Italian radio station — two AI hosts banter, react to your home, and play CC-licensed music (Jamendo), live charts, or local files. Real radio feel, no subscriptions.
slug: mammamiradio
version: 2.16.0
stage: stable
url: https://github.com/florianhorner/mammamiradio
image: ghcr.io/florianhorner/mammamiradio-addon-{arch}
arch:
  - amd64
  - aarch64
init: false
timeout: 240
healthcheck: http://[HOST]:[PORT:8000]/healthz
host_network: true
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8000
panel_icon: mdi:radio
panel_title: Mamma Mi Radio
ports:
  8000/tcp: null
ports_description:
  8000/tcp: Web UI and stream
map:
  - addon_config:rw
options:
  station_name: "Mamma Mi Radio"
  enable_home_assistant: true
  ha_media_player_push: true
  quality_profile: "balanced"
  admin_token: ""
  super_italian_mode: false
  chaos_mode_active: false
  festival_mode: false
  broadcast_chain: false
  guest_host: true
  songs_between_banter: 2
  songs_between_ads: 4
  ad_spots_per_break: 2
schema:
  station_name: str?
  enable_home_assistant: bool?
  ha_media_player_push: bool?
  quality_profile: list(premium|balanced|economy)?
  admin_token: password?
  super_italian_mode: bool?
  chaos_mode_active: bool?
  festival_mode: bool?
  broadcast_chain: bool?
  guest_host: bool?
  songs_between_banter: int(2,60)?
  songs_between_ads: int(1,60)?
  ad_spots_per_break: int(1,5)?
  jamendo_client_id: password?
