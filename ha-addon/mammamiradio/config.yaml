  openai_api_key: ""
  station_name: "Mamma Mi Radio"
  claude_model: "claude-haiku-4-5-20251001"
  admin_token: ""
  enable_home_assistant: true
  super_italian_mode: false
  chaos_mode_active: false
  jamendo_client_id: ""
schema:
  anthropic_api_key: password?
