configuration:
  anthropic_api_key:
    name: Anthropic API Key
    description: Required for AI-generated banter and ads. Get one at console.anthropic.com. Without this, the station uses stock banter.
  openai_api_key:
    name: OpenAI API Key
    description: Enables gpt-4o-mini-tts voice for hosts configured with engine="openai". Get one at platform.openai.com. Without this, all hosts use Edge TTS.
  station_name:
    name: Station Name
    description: Your radio station's name (shown in the UI and stream metadata).
  claude_model:
    name: AI Model
    description: "Haiku: fast and cheap. Sonnet: balanced. Opus: highest quality but slower."
  admin_token:
    name: Admin Token
    description: "Set a stable token for the admin API and HA media_player integration. If left empty, one is auto-generated on each restart (check the add-on log to retrieve it)."
  enable_home_assistant:
    name: Enable Home Assistant Integration
    description: "Let hosts reference your home state (lights, presence, climate) in banter and ads. Requires the add-on to have API access — enable this if the boot log shows ha=disabled."
  super_italian_mode:
    name: Super Italian Mode
    description: "Off (default): listener UI in English with Italian station-feel words intact; AI hosts code-switch with Italian sprinkles. On: listener UI flips to full Italian and hosts lean fully into Italian idioms. Admin UI stays English regardless."
  chaos_mode_active:
    name: Chaos Mode
    description: "Keeps host-chaos mode enabled across restarts. Turning it on from the admin panel still arms the immediate first strike; boot restore does not."
  festival_mode:
    name: Festival Mode
    description: "Turns your station into a theatrical music competition. Hosts announce songs as fictional Italian regional delegations, assign dramatic points, and call drinking game triggers. Toggleable live from the admin panel without a restart."
  jamendo_client_id:
    name: Jamendo Client ID
    description: "Enables CC-licensed music from Jamendo. Get a free client ID at developer.jamendo.com. Leave empty to disable the Jamendo source."
