[station]
name = "Mamma Mi Radio"
language = "it"
theme = "unhinged late-night Italian shock radio broadcasting from somewhere between Windor and Vergen. Two hosts who roast each other, roast the listeners, roast Italy itself. Think Le Iene meets GTA radio. Absurd traffic reports about burning Lamborghinis, breaking news about pizza dough exported to Russia, and sports flashes delivered like a Serie A commentator having a meltdown. Edgy, chaotic, over the top — but always unmistakably Italian."

[sonic_brand]
tagline = "Da Windor a Vergen, la voce che non si spegne mai!"
geography = "Windor, Vergen"
# Full station ident — plays at top of hour and after ad breaks
full_ident = "Mamma Mi Radio... da Windor a Vergen, la voce che non si spegne mai!"
# Short sung jingle — plays before banter segments
short_sting = "Malamie..."
# Sweeper lines — short voice drops between songs
sweepers = [
    "Mamma Mi Radio.",
    "Windor, Vergen... e tutto il mondo che ascolta.",
    "Sei su Malamie.",
    "La radio che tua nonna non approverebbe.",
    "Da Windor a Vergen, nessuno è al sicuro.",
]
# Rhodes motif: C5 → E5 → G5 → C6 (ascending major arpeggio)
motif_notes = [523, 659, 784, 1047]
# Sweeper voice — uses a host voice for station idents
sweeper_voice = "it-IT-GiuseppeMultilingualNeural"
# Probability of inserting a sweeper after a music segment (0.0–1.0)
sweeper_probability = 0.25

[playlist]
shuffle = true
allow_explicit = true   # false = skip tracks marked explicit
repeat_cooldown = 5     # Min songs before the same track can replay
artist_cooldown = 3     # Min songs before the same artist replays
max_artist_per_hour = 3 # Hard cap on same artist within ~60 min window

[pacing]
songs_between_banter = 2
songs_between_ads = 4
ad_spots_per_break = 2
lookahead_segments = 3

[[hosts]]
name = "Marco"
voice = "onyx"
engine = "openai"
edge_fallback_voice = "it-IT-GiuseppeMultilingualNeural"
style = "manic energy, steamrolls every conversation, interrupts people mid-thought, says things he shouldn't on air, conspiracy theories about Italian food, gets way too personal about listeners' lives, drops obscure cinema references nobody asked for, once got suspended for a week (he's proud of it), massive ego, catastrophically bad takes delivered with total conviction, never admits he's wrong — doubles down harder when cornered, genuinely believes he is the reason people tune in"
[hosts.personality]
energy = 100
chaos = 100
warmth = 55
verbosity = 68
nostalgia = 75

[[hosts]]
name = "Giulia"
voice = "it-IT-IsabellaNeural"
style = "razor-sharp sarcasm, cuts Marco off whenever he deserves it, openly judges the playlist, delivers devastating one-liners with zero emotion, pretends she's too good for this station but clearly loves it, will burn any caller who says something stupid, openly contemptuous of Marco's intelligence, delivers devastation with the warmth of a tax audit, treats him like a slow child she is legally obligated to work with"
[hosts.personality]
energy = 72
chaos = 92
warmth = 20
verbosity = 66
nostalgia = 30

[audio]
sample_rate = 48000
channels = 2
bitrate = 192
claude_model = "claude-haiku-4-5-20251001"
claude_creative_model = "claude-opus-4-6"

[homeassistant]
enabled = false
url = ""
poll_interval = 60  # seconds between state refreshes

[persona]
arc_thresholds = [4, 11, 26]   # session counts for acquaintance, friend, old_friend
anthem_threshold = 3            # plays without skip to declare anthem
skip_bit_threshold = 2          # skips to declare skip-bit

[ads]
sfx_dir = "sfx"

