# Station personality dial. ON (default): listener UI and hosts are Italian-first.
# OFF: listener UI in English with Italian
# headlines and station-feel words; AI hosts code-switch (English narrative +
# Italian flavor). ON: full Italian throughout. Toggleable from the admin
# Engine Room or via MAMMAMIRADIO_SUPER_ITALIAN env var.
super_italian_mode = false

[station]
name = "Mamma Mi Radio"
language = "it"
theme = "unhinged late-night Italian shock radio broadcasting from somewhere between Windor and Vergen. Two hosts who roast each other, roast the listeners, roast Italy itself. Think Le Iene meets GTA radio. Absurd traffic reports about burning Lamborghinis, breaking news about pizza dough exported to Russia, and sports flashes delivered like a sharp radio sports desk that stays informed even when the match is absurd. Edgy, chaotic, over the top — but always unmistakably Italian."

[sonic_brand]
tagline = "Da Windor a Vergen, la voce che non si spegne mai!"
geography = "Windor, Vergen"
# Full station ident — plays at top of hour and after ad breaks
full_ident = "Mamma Mi Radio... da Windor a Vergen, la voce che non si spegne mai!"
# Sweeper lines — short voice drops between songs
sweepers = [
    "Mamma Mi Radio.",
    "Windor, Vergen... e tutto il mondo che ascolta.",
    "Sei su Mamma Mi Radio.",
    "La radio che tua nonna non approverebbe.",
    "Da Windor a Vergen, nessuno è al sicuro.",
]
# Rhodes motif: C5 → E5 → G5 → C6 (ascending major arpeggio)
motif_notes = [523, 659, 784, 1047]
# Sweeper voice — uses a host voice for station idents
sweeper_voice = "it-IT-Isabella:DragonHDLatestNeural"
sweeper_engine = "azure"
sweeper_edge_fallback_voice = "it-IT-GiuseppeMultilingualNeural"

# ────────────────────────────────────────────────────────────────────────
# [brand] — what the LISTENER reads on the public page. Separate from
# [station] (operator config). Each operator's station is a piece of
# fiction the engine powers. Theme tokens override Volare Refined defaults.
# ────────────────────────────────────────────────────────────────────────
[brand]
station_name = "Mamma Mi Radio"
frequency = "96,7 FM"
city = ""
founded = 2024
tagline = "La radio che ascolta la tua casa"
about = "Conduttori notturni registrati su nastro e rimixati per la sera. Da Windor a Vergen. La voce che non si spegne mai."
opengraph_subtitle = "AI Italian late-night radio · 96,7 FM"

[brand.theme]
# Volare Refined defaults — override per station fiction.
# All values validated at config load: hex contrast >= 4.5:1 vs --cream,
# background lightness <= 25%, fonts from curated list (see config.py).
primary_color = "#F4D048"
accent_color = "#B82C20"
background_color = "#14110F"
display_font = "Playfair Display"
body_font = "Outfit"
mono_font = "JetBrains Mono"

# Per-host display name (FK to [[hosts]].name). Multiple brand hosts can
# share one engine_host (different alter egos voiced by the same engine).
[[brand.hosts]]
engine_host = "Marco"
display_name = "Marco del bar"
description = "Conduttore notturno, nato in periferia. Voce graffiante, sigaretta sempre accesa."

[[brand.hosts]]
engine_host = "Giulia"
display_name = "Nonna Giulia"
description = "Voce della cucina. Legge le dediche con calore e ironia. Ti chiama 'tesoro' anche se ha 80 anni."

[playlist]
shuffle = true
allow_explicit = true   # false = skip tracks marked explicit
repeat_cooldown = 5     # Min songs before the same track can replay
artist_cooldown = 3     # Min songs before the same artist replays
max_artist_per_hour = 3 # Hard cap on same artist within ~60 min window
jamendo_client_id = ""
jamendo_tags = "pop"
jamendo_country = "ITA"          # ISO 3166-1 alpha-3; "" disables country filter. Other "skins": DEU, FRA, BRA, ...
jamendo_order = "popularity_week" # popularity_week|popularity_month|popularity_total|releasedate_desc|"" (default)
jamendo_limit = 200              # Jamendo API result depth, 1-200

[pacing]
songs_between_banter = 2
songs_between_ads = 4
ad_spots_per_break = 2
lookahead_segments = 3

[[hosts]]
name = "Marco"
voice = "o4b57JYAECRMJyCEXyIE"
engine = "elevenlabs"
edge_fallback_voice = "it-IT-GiuseppeMultilingualNeural"
voice_settings = { stability = 0.6 }  # tighter diction — fixes Marco's mumble (auditioned 0.42 vs 0.6)
style = "manic energy, steamrolls every conversation, interrupts people mid-thought, says things he shouldn't on air, conspiracy theories about Italian food, gets way too personal about listeners' lives, drops obscure cinema references nobody asked for, once got suspended for a week (he's proud of it), massive ego, catastrophically bad takes delivered with total conviction, never admits he's wrong — doubles down harder when cornered, genuinely believes he is the reason people tune in"
[hosts.personality]
energy = 100
chaos = 100
warmth = 55
verbosity = 68
nostalgia = 75

[[hosts]]
name = "Giulia"
voice = "fNmw8sukfGuvWVOp33Ge"
engine = "elevenlabs"
edge_fallback_voice = "it-IT-IsabellaNeural"
style = "razor-sharp sarcasm, cuts Marco off whenever he deserves it, openly judges the playlist, delivers devastating one-liners with zero emotion, pretends she's too good for this station but clearly loves it, will burn any caller who says something stupid, openly contemptuous of Marco's intelligence, delivers devastation with the warmth of a tax audit, treats him like a slow child she is legally obligated to work with"
[hosts.personality]
energy = 72
chaos = 92
warmth = 20
verbosity = 66
nostalgia = 30

[audio]
sample_rate = 48000
channels = 2
bitrate = 192
# Integrated-LUFS targets for the loudness-reconciliation pass: every finished
# segment is measured and nudged to one level so music, hosts, beds and ads no
# longer jump in volume. Ads sit 1 LU hotter so they still pop.
lufs_target = -16.0
ad_lufs_target = -15.0

# ── Dynamic LLM routing ───────────────────────────────────────────────────
# Script generation never names a model in code. A task asks for a ROLE; the
# catalog maps role→model per provider; the active profile (the admin "quality
# dial": premium|balanced|economy) selects which catalog entry each role uses.
#
#   task ──routing──▶ role ──profile──▶ catalog key ──catalog──▶ model id
#
# Swap any model = edit ONE catalog line below. No code change, no stale dropdown.
# `fast` is pinned to the lowest-latency model in every profile (transitions are
# latency-sensitive — a slow one risks dead air).
[models]
default_profile = "balanced"

[models.catalog.anthropic]   # the ONLY place Anthropic model IDs live
opus   = "claude-opus-4-8"
sonnet = "claude-sonnet-4-6"
haiku  = "claude-haiku-4-5-20251001"

[models.catalog.openai]      # the ONLY place OpenAI model IDs live
large = "gpt-4o"
small = "gpt-4o-mini"

[models.routing]             # task (caller) → role
banter     = "creative"
news_flash = "creative"
ad         = "creative"
transition = "fast"

[models.profiles.premium]    # role → catalog key, per provider
anthropic = { creative = "opus", fast = "haiku" }
openai    = { creative = "large", fast = "small" }

[models.profiles.balanced]   # reproduces prior behavior (creative=opus, fast=haiku)
anthropic = { creative = "opus", fast = "haiku" }
openai    = { creative = "small", fast = "small" }

[models.profiles.economy]
anthropic = { creative = "haiku", fast = "haiku" }
openai    = { creative = "small", fast = "small" }

[homeassistant]
enabled = false
url = ""
poll_interval = 60           # seconds between full home-state refreshes
timer_poll_interval = 5      # seconds between lightweight timer-entity checks

# Timer interrupt: when a HA timer fires, hosts immediately interrupt and deliver
# a pissed/urgent message. Add one [[homeassistant.timer_interrupt]] block per timer.
# entity_id: the HA timer entity (e.g. timer.pasta_timer)
# directive:  what the hosts should say — in the language of your station
# urgency:    "pissed" (default) | "urgent" | "gentle"
# cooldown:   minimum seconds before the same timer can fire again (default: 60)
#
# Example (uncomment and adapt):
# [[homeassistant.timer_interrupt]]
# entity_id = "timer.pasta_timer"
# directive = "Il timer della pasta è scaduto! Tirate fuori quella pasta adesso, per l'amor di Dio!"
# urgency = "pissed"
# cooldown = 300
#
# [[homeassistant.timer_interrupt]]
# entity_id = "timer.lavatrice"
# directive = "La lavatrice ha finito. Muovetevi prima che si sgualcisca tutto."
# urgency = "urgent"

[persona]
arc_thresholds = [4, 11, 26]   # session counts for acquaintance, friend, old_friend
anthem_threshold = 3            # plays without skip to declare anthem
skip_bit_threshold = 2          # skips to declare skip-bit

[ads]
sfx_dir = "sfx"

[imaging]
bed_volume_db = -18.0
use_music_queue_for_beds = true
assets_dir = ""

