name: "Fake Italian Radio"
description: "AI-powered fake Italian radio station with live MP3 streaming, Claude-written banter, and Home Assistant context"
version: "0.1.1"
slug: "fakeitaliradio"
url: "https://github.com/florianhorner/mammamiradio"
arch:
  - amd64
  - aarch64
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "MP3 stream (for media players like Sonos, VLC)"
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:radio"
panel_title: "Radio Italì"
homeassistant_api: true
map:
  - addon_config:rw
options:
  spotify_client_id: ""
  spotify_client_secret: ""
  anthropic_api_key: ""
  admin_password: ""
schema:
  spotify_client_id: "str?"
  spotify_client_secret: "str?"
  anthropic_api_key: "str?"
  admin_password: "str?"
image: ghcr.io/florianhorner/fakeitaliradio-addon-{arch}
startup: "application"
boot: "auto"
