name: "Mamma Mi Radio"
description: "AI-powered Italian radio station — streams Claude-generated banter, music, and ads with Home Assistant context"
version: "1.0.0"
slug: "mammamiradio"
url: "https://github.com/florianhorner/mammamiradio"
arch:
  - amd64
  - aarch64
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "MP3 stream (for media players like Sonos, VLC)"
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:radio"
panel_title: "Radio Italì"
homeassistant_api: true
map:
  - addon_config:rw
options:
  spotify_client_id: ""
  spotify_client_secret: ""
  anthropic_api_key: ""
  admin_password: ""
schema:
  spotify_client_id: "str?"
  spotify_client_secret: "str?"
  anthropic_api_key: "str?"
  admin_password: "str?"
startup: "application"
boot: "auto"
