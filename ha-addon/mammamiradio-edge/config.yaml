name: Mamma Mi Radio (Edge)
description: Development channel — always the latest main-branch build. For testing only; use the stable Mamma Mi Radio add-on for daily listening.
slug: mammamiradio-edge
version: 1b69449
stage: experimental
url: https://github.com/florianhorner/mammamiradio
image: ghcr.io/florianhorner/mammamiradio-addon-{arch}
arch:
  - amd64
  - aarch64
init: false
timeout: 240
healthcheck: http://[HOST]:[PORT:8000]/healthz
host_network: true
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8000
panel_icon: mdi:radio
panel_title: Mamma Mi Radio (Edge)
ports:
  8000/tcp: null
ports_description:
  8000/tcp: Web UI and stream
map:
  - addon_config:rw
options:
  station_name: "Mamma Mi Radio"
  jamendo_client_id: ""
  anthropic_api_key: ""
  openai_api_key: ""
  azure_speech_key: ""
  azure_speech_region: ""
  elevenlabs_api_key: ""
  quality_profile: "balanced"
  enable_home_assistant: true
  admin_token: ""
  super_italian_mode: false
  chaos_mode_active: false
  festival_mode: false
schema:
  station_name: str?
  jamendo_client_id: password?
  anthropic_api_key: password?
  openai_api_key: password?
  azure_speech_key: password?
  azure_speech_region: str?
  elevenlabs_api_key: password?
  quality_profile: list(premium|balanced|economy)?
  enable_home_assistant: bool?
  admin_token: password?
  super_italian_mode: bool?
  chaos_mode_active: bool?
  festival_mode: bool?
