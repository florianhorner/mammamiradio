<!--
  Hero banner source template for docs/banner.png and docs/social-card.png

  Workflow to regenerate:
  1. Generate a warm "La Casa Ti Ascolta" smart-home room background via an image
     generation tool and save it as docs/banner-bg.png.
  2. Serve this dir: python3 -m http.server 9191 (from docs/)
  3. Screenshot at 1280x640:
     browse goto http://localhost:9191/hero-composite.html
     browse viewport 1280x640
     browse screenshot banner.png
  4. Copy the final 1280x640 image to both docs/banner.png and
     docs/social-card.png when the README hero and social preview should match.
  5. Delete banner-bg.png before committing.

  Background image prompt:
  "Wide cinematic banner, 1280x640 crop from a warm Home Assistant-native smart
  home scene. A cozy Italian living room at evening, espresso dark wood, golden
  ambient light, a tasteful radio/audio setup, subtle smart-home cues, lived-in
  family warmth, soft depth of field, no text. Keep the left third dark and calm
  for a typography overlay. The image should feel like the house is awake and
  listening, not like a product render."
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mamma Mi Radio hero composite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    position: relative;
    background: #14110F;
    font-family: "Outfit", system-ui, sans-serif;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 52%;
  }

  .fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      #14110F 0%,
      #14110F 24%,
      rgba(20, 17, 15, 0.84) 42%,
      rgba(20, 17, 15, 0.34) 60%,
      transparent 80%
    );
  }

  .vig {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 72%, rgba(20, 17, 15, 0.5));
  }

  body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    z-index: 5;
    background: linear-gradient(90deg, transparent, rgba(244, 208, 72, 0.28), transparent);
  }

  .overlay {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 660px;
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 0 0 66px;
  }

  .on-air {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 20px;
  }

  .on-air-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #F4D048;
    box-shadow: 0 0 8px rgba(244, 208, 72, 0.75), 0 0 18px rgba(244, 208, 72, 0.35);
  }

  .on-air-label {
    font: 700 12px "Outfit", system-ui, sans-serif;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #F4D048;
  }

  .station-name {
    font-family: "Playfair Display", Georgia, serif;
    font-style: italic;
    font-weight: 700;
    font-size: 58px;
    line-height: 1.02;
    letter-spacing: 0;
    color: #F5EDD8;
    margin: 0 0 18px;
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55), 0 2px 24px rgba(0, 0, 0, 0.45);
  }

  .station-name .mi {
    color: #F4D048;
    font-style: italic;
  }

  .tricolor {
    display: flex;
    height: 3px;
    width: 280px;
    border-radius: 2px;
    overflow: hidden;
    opacity: 0.9;
    margin: 0 0 18px;
  }

  .tricolor span {
    flex: 1;
  }

  .tricolor .g {
    background: #1A7A3E;
  }

  .tricolor .w {
    background: rgba(245, 237, 216, 0.9);
  }

  .tricolor .r {
    background: #B82C20;
  }

  .tagline {
    font: 400 17px "Outfit", system-ui, sans-serif;
    line-height: 1.4;
    color: rgba(245, 237, 216, 0.85);
    margin: 0;
  }

  .descriptor {
    font: 400 13px "Outfit", system-ui, sans-serif;
    color: rgba(238, 225, 200, 0.6);
    margin: 13px 0 0;
    letter-spacing: 0.015em;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <img class="bg" src="./banner-bg.png" alt="">
  <div class="fade"></div>
  <div class="vig"></div>

  <div class="overlay">
    <div class="on-air">
      <span class="on-air-dot"></span>
      <span class="on-air-label">On Air &middot; La Casa Ti Ascolta</span>
    </div>

    <h1 class="station-name">Mamma <span class="mi">Mi</span> Radio</h1>

    <div class="tricolor">
      <span class="g"></span>
      <span class="w"></span>
      <span class="r"></span>
    </div>

    <p class="tagline">Two Italian hosts.<br>One very opinionated smart home.</p>
    <p class="descriptor">Your own AI radio station, native to Home Assistant.</p>
  </div>
</body>
</html>
