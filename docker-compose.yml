services:
  mammamiradio:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MAMMAMIRADIO_BIND_HOST=0.0.0.0
      - MAMMAMIRADIO_PORT=8000
      - MAMMAMIRADIO_CACHE_DIR=/data/cache
      - MAMMAMIRADIO_TMP_DIR=/data/tmp
      # Admin token for non-loopback access.
      # If unset, the entrypoint auto-generates one and persists it to
      # /data/admin_token (readable via `docker compose exec mammamiradio cat /data/admin_token`).
      # Override here only if you want to pin a known value.
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      # Enable yt-dlp chart music by default so `docker compose up` has something to play.
      # Set MAMMAMIRADIO_ALLOW_YTDLP=false in .env to restrict to local MP3s.
      - MAMMAMIRADIO_ALLOW_YTDLP=${MAMMAMIRADIO_ALLOW_YTDLP:-true}
      # Optional: Anthropic API key for AI-generated banter/ads
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional: OpenAI API key (TTS voices + script generation fallback)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Optional: Home Assistant
      - HA_TOKEN=${HA_TOKEN:-}
      - HA_URL=${HA_URL:-}
    volumes:
      - radio-data:/data
    restart: unless-stopped

volumes:
  radio-data:
