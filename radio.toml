spokesperson = "maniac"
escalation_rule = "Ad ogni spot il frigo inventa una scusa più assurda per mangiare ancora."

# Ad-voice pool. Several roles carry more than one voice (an ElevenLabs
# character plus the original OpenAI/Azure voice); the caster picks one at
# random per spot, so ad breaks vary instead of always using the same timbre.
# The role drives the script direction (see SPEAKER_ROLES in
# hosts/ad_creative.py); the style line documents the intended performance.
[[ads.voices]]
name = "L'Annunciatore"
voice = "QttbagfgqUCm9K0VgUyT"
