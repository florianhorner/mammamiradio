[hosts.personality]
energy = 92
chaos = 65
warmth = 88
verbosity = 62
nostalgia = 50

[audio]
sample_rate = 48000
channels = 2
bitrate = 192
# Integrated-LUFS targets for the loudness-reconciliation pass: every finished
# segment is measured and nudged to one level so music, hosts, beds and ads no
# longer jump in volume. Ads sit 1 LU hotter so they still pop.
lufs_target = -16.0
ad_lufs_target = -15.0
# FM broadcast chain: colour every aired segment like an over-the-air FM signal
# (gentle pre-emphasis, a ~15 kHz band-limit, and a flat level trim) so the station
# sounds like radio, not a clean studio file. Default OFF (studio-clean): the colour
# is deliberately subtle and often imperceptible on good speakers. Set true to opt in.
broadcast_chain = false

# Model IDs, provider routing, TTS selection, and model pricing live in the
# canonical sibling model_registry.toml. This station configuration deliberately
# contains no provider model identity.

[homeassistant]
enabled = false
url = ""
context_enabled = true       # set false to keep HA entity pushes while disabling full prompt-context polling
poll_interval = 300          # seconds between full home-state refreshes
timer_poll_interval = 5      # seconds between lightweight timer-entity checks
context_refresh_timeout = 2.0  # warm foreground wait; cold first refresh gets 20s, with one retained request capped at 30s total
mood_llm_enabled = false       # experimental: background AI scene-namer for home mood; heuristic mood stays the instant fallback
mood_ttl_seconds = 90.0        # minimum seconds between background scene refresh attempts; the last scene keeps airing while a refresh runs (bounded staleness)

# Timer interrupt: when a HA timer fires, hosts immediately interrupt and deliver
# a pissed/urgent message. Add one [[homeassistant.timer_interrupt]] block per timer.
# entity_id: the HA timer entity (e.g. timer.pasta_timer)
# directive:  what the hosts should say — in the language of your station
# urgency:    "pissed" (default) | "urgent" | "gentle"
# cooldown:   minimum seconds before the same timer can fire again (default: 60)
#
# Example (uncomment and adapt):
# [[homeassistant.timer_interrupt]]
# entity_id = "timer.pasta_timer"
# directive = "Il timer della pasta è scaduto! Tirate fuori quella pasta adesso, per l'amor di Dio!"
# urgency = "pissed"
# cooldown = 300
#
# [[homeassistant.timer_interrupt]]
# entity_id = "timer.lavatrice"
# directive = "La lavatrice ha finito. Muovetevi prima che si sgualcisca tutto."
# urgency = "urgent"

# Evening running gags ("the coffee machine, on again tonight"). The station
# notices repeated home toggles over an evening and weaves a deferred, approximate
# callback into banter. Candidacy is by device DOMAIN, so it works on any home with
# no config: switch / fan / lock / vacuum / binary_sensor (doorbell, presence)
# toggles are gag-worthy; sensors, climate, media, lights, and person trackers are
# not. Override only if you want to tune it.
# [home.running_gags]
# domain_allowlist = ["switch", "fan", "lock", "vacuum", "binary_sensor"]  # replaces the default domain set
# entity_allowlist = []   # if non-empty, restricts gags to these exact entity_ids
# entity_denylist  = []   # silence chatty entities, e.g. a flapping presence sensor

# Opt-in radio-worthy Home Assistant events. These rules do NOT add the matched
# entity to the ambient prompt context; they only promote the configured label or
# directive. Diagnostic signal strength, timestamps, and battery percentage
# sensors are ignored even under broad globs.
#
# [[home.radio_event]]
# id = "tts_script_started"
# entity_glob = "script.*tts*"
# trigger = "state"
# from_state = "off"
# to_state = "on"
# mode = "directive"
# directive = "One of the house voices just spoke. Mention it once in the next break without naming the source entity."
# cooldown_seconds = 900
#
# [[home.radio_event]]
# id = "tts_automation_fired"
# entity_glob = "automation.*tts*"
# trigger = "attribute"
# attribute = "last_triggered"
# mode = "directive"
# directive = "A Home Assistant voice automation just fired. Make a short, playful next-break callout."
# cooldown_seconds = 900
#
# [[home.radio_event]]
# id = "device_charging"
# label = "A household device started charging"
# domain = "binary_sensor"
# device_class = "battery_charging"  # or "plug" for plug sensors
# trigger = "state"
# from_state = "off"
# to_state = "on"
# mode = "gag"
# cooldown_seconds = 900

[persona]
arc_thresholds = [4, 11, 26]   # session counts for acquaintance, friend, old_friend
anthem_threshold = 3            # plays without skip to declare anthem
skip_bit_threshold = 2          # skips to declare skip-bit

[ads]
sfx_dir = "sfx"

[imaging]
bed_volume_db = -18.0
use_music_queue_for_beds = true
assets_dir = ""

