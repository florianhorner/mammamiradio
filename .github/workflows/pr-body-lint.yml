name: pr-body-lint

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review]

concurrency:
  group: pr-body-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint PR body for editorial violations
    runs-on: ubuntu-latest

    # Skip draft PRs and bot-authored PRs (dependabot, pre-commit-ci, github-actions).
    if: |
      github.event.pull_request.draft == false &&
      !contains(fromJson('["dependabot[bot]","pre-commit-ci[bot]","github-actions[bot]"]'), github.event.pull_request.user.login)

    steps:
      # Check out the PR base (trusted) — not head — so a PR cannot neuter the
      # lint script in the same change to bypass enforcement. PRs that modify
      # the lint take effect only after merging to base.
      - name: Checkout base ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Fetch PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? "";
            const fs = require("fs");
            fs.writeFileSync("/tmp/pr-body.md", body, "utf8");
            core.info(`PR body length: ${body.length} chars`);

      - name: Run PR-body editorial lint
        run: |
          if [ ! -x scripts/check-pr-body-lint.sh ]; then
            echo "scripts/check-pr-body-lint.sh not present on base ref — skipping (script will activate once merged to base)."
            exit 0
          fi
          bash scripts/check-pr-body-lint.sh /tmp/pr-body.md
