name: Build HA Addon

on:
  push:
    branches: [main]
    paths:
      - "ha-addon/**"
      - "mammamiradio/**"
      - "pyproject.toml"
      - "radio.toml"
  workflow_dispatch:

# Serialize runs on the same ref so two near-simultaneous merges don't run
# redundant concurrent image builds.
concurrency:
  group: addon-build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/mammamiradio-addon

jobs:
  validate:
    runs-on: ubuntu-latest
    # Skip the redundant rebuild when the push is a manual edge-release commit
    # (`chore(edge): cut edge release <sha>`): the image for that SHA already
    # exists; the commit only advanced the edge add-on's version: field.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(edge): cut edge release')
    outputs:
      addon_version: ${{ steps.addon-version.outputs.version }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate add-on invariants
        run: bash scripts/validate-addon.sh

      - name: Read stable add-on version
        id: addon-version
        run: |
          set -e
          VERSION=$(grep '^version:' ha-addon/mammamiradio/config.yaml | awk '{print $2}' | tr -d '"')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract version from ha-addon/mammamiradio/config.yaml — is the version: field present?"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Stable add-on version: $VERSION"

      - name: Compute short SHA (edge image tag)
        id: sha
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Edge image short SHA: $SHORT_SHA"

  build:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.20
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Copy source into addon build context
        run: |
          cp -r mammamiradio/ ha-addon/mammamiradio/mammamiradio/
          cp pyproject.toml ha-addon/mammamiradio/

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push stable add-on image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ha-addon/mammamiradio
          file: ha-addon/mammamiradio/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_VERSION=${{ needs.validate.outputs.addon_version }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ needs.validate.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  smoke:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull amd64 image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}

      - name: Run container smoke test
        run: |
          # The addon entrypoint (rootfs/run.sh) hardcodes uvicorn to bind
          # 0.0.0.0:8000 — the HA Supervisor ingress contract requires it.
          # The MAMMAMIRADIO_PORT env var is overwritten inside the container,
          # so the host-side port mapping must target the container's real port (8000).
          # Supervisor always sets SUPERVISOR_TOKEN; the addon's tokenless-LAN-admin
          # path requires it (see config._is_addon). Without it the image boots in
          # standalone mode, where binding 0.0.0.0 with no admin token is a fatal
          # config error and uvicorn never starts.
          docker run -d --name mamma-smoke \
            -p 8765:8000 \
            -e LOG_LEVEL=WARNING \
            -e SUPERVISOR_TOKEN=smoke-ci \
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}
          sleep 40
          HEALTH=$(curl -sS --retry 8 --retry-delay 3 --retry-connrefused http://localhost:8765/healthz)
          echo "$HEALTH"
          STATUS=$(echo "$HEALTH" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')
          QE=$(echo "$HEALTH" | python3 -c 'import json,sys; print(float(json.load(sys.stdin).get("queue_empty_elapsed_s",0) or 0))')
          if [ "$STATUS" = "failing" ] || awk "BEGIN{exit !($QE > 30)}"; then
            echo "::error::Smoke failed: status=$STATUS queue_empty_elapsed_s=$QE"
            docker logs mamma-smoke 2>&1 | tail -50
            exit 1
          fi
          echo "Smoke OK: status=$STATUS queue_empty_elapsed_s=$QE"
          docker logs mamma-smoke 2>&1 | tail -50

      - name: Cleanup
        if: always()
        run: docker stop mamma-smoke && docker rm mamma-smoke || true
