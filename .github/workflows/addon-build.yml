name: Build HA Addon

on:
  push:
    branches: [main]
    paths:
      - "ha-addon/**"
      - "mammamiradio/**"
      - "pyproject.toml"
      - "radio.toml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/mammamiradio-addon

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate version consistency
        run: |
          ADDON_VER=$(grep '^version:' ha-addon/mammamiradio/config.yaml | awk '{print $2}' | tr -d '"')
          PYPROJECT_VER=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"//;s/".*//')
          echo "Addon version: $ADDON_VER"
          echo "pyproject.toml version: $PYPROJECT_VER"
          if [ "$ADDON_VER" != "$PYPROJECT_VER" ]; then
            echo "::error::Version mismatch: config.yaml=$ADDON_VER pyproject.toml=$PYPROJECT_VER"
            exit 1
          fi

      - name: Validate config.yaml image path matches CI tags
        run: |
          IMAGE=$(grep '^image:' ha-addon/mammamiradio/config.yaml | awk '{print $2}')
          EXPECTED="ghcr.io/${{ github.repository_owner }}/mammamiradio-addon-{arch}"
          echo "Image in config.yaml: $IMAGE"
          echo "Expected: $EXPECTED"
          if [ "$IMAGE" != "$EXPECTED" ]; then
            echo "::error::Image path mismatch: config.yaml has '$IMAGE', CI pushes to '$EXPECTED'"
            exit 1
          fi

      - name: Validate addon options are mapped in run.sh
        run: |
          # Extract option keys from config.yaml schema section
          SCHEMA_KEYS=$(sed -n '/^schema:/,/^[^ ]/p' ha-addon/mammamiradio/config.yaml | grep -E '^\s+\w+:' | awk -F: '{print $1}' | tr -d ' ')
          # Check each key is referenced in run.sh
          MISSING=""
          for key in $SCHEMA_KEYS; do
            if ! grep -q "$key" ha-addon/mammamiradio/rootfs/run.sh; then
              MISSING="$MISSING $key"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Config keys not mapped in run.sh:$MISSING"
            exit 1
          fi

      - name: Validate addon radio.toml matches root radio.toml
        run: |
          # Contract since 2.10.3: ha-addon/mammamiradio/radio.toml is byte-for-byte identical to root radio.toml.
          # scripts/test-addon-local.sh and tests/test_addon_radio_sync.py enforce the same invariant.
          if ! cmp -s radio.toml ha-addon/mammamiradio/radio.toml; then
            echo "::error::ha-addon/mammamiradio/radio.toml drifted from root radio.toml — keep them byte-identical"
            diff radio.toml ha-addon/mammamiradio/radio.toml || true
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.20
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read addon version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' ha-addon/mammamiradio/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Copy source into addon build context
        run: |
          cp -r mammamiradio/ ha-addon/mammamiradio/mammamiradio/
          cp pyproject.toml ha-addon/mammamiradio/

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ha-addon/mammamiradio
          file: ha-addon/mammamiradio/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ github.sha }}

  smoke:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull amd64 image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}

      - name: Run container smoke test
        run: |
          docker run -d --name mamma-smoke \
            -p 8765:8099 \
            -e MAMMAMIRADIO_PORT=8099 \
            -e LOG_LEVEL=WARNING \
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}
          sleep 15
          curl --retry 5 --retry-delay 3 --retry-connrefused -f http://localhost:8765/healthz
          docker logs mamma-smoke 2>&1 | tail -50

      - name: Check no silent queue-empty with listeners
        run: |
          STATUS=$(curl -sf http://localhost:8765/healthz | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['status'])")
          echo "Health status: $STATUS"
          if [ "$STATUS" = "failing" ]; then
            echo "::error::Container reports silent failure — queue empty with active listeners"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker stop mamma-smoke && docker rm mamma-smoke || true
