name: Build HA Addon

on:
  push:
    branches: [main]
    paths:
      - "ha-addon/**"
      - "mammamiradio/**"
      - "pyproject.toml"
      - "radio.toml"
      - "model_registry.toml"
  workflow_dispatch:

# Serialize runs on the same ref so two near-simultaneous merges don't run
# redundant concurrent image builds.
concurrency:
  group: addon-build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/mammamiradio-addon

jobs:
  validate:
    runs-on: ubuntu-latest
    # Skip the redundant rebuild when the push is a manual edge-release commit
    # (`chore(edge): cut edge release <sha>`): the image for that SHA already
    # exists; the commit only advanced the edge add-on's version: field.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(edge): cut edge release')
    outputs:
      addon_version: ${{ steps.addon-version.outputs.version }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate add-on invariants
        run: bash scripts/validate-addon.sh

      - name: Read stable add-on version
        id: addon-version
        run: |
          set -e
          VERSION=$(grep '^version:' ha-addon/mammamiradio/config.yaml | awk '{print $2}' | tr -d '"')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract version from ha-addon/mammamiradio/config.yaml — is the version: field present?"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Stable add-on version: $VERSION"

      - name: Compute short SHA (edge image tag)
        id: sha
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Edge image short SHA: $SHORT_SHA"

  build:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.20
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Copy source into addon build context
        run: |
          cp -r mammamiradio/ ha-addon/mammamiradio/mammamiradio/
          cp pyproject.toml ha-addon/mammamiradio/
          cp model_registry.toml ha-addon/mammamiradio/

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push stable add-on image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ha-addon/mammamiradio
          file: ha-addon/mammamiradio/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_VERSION=${{ needs.validate.outputs.addon_version }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ needs.validate.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  smoke:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      # Needed by "Assert installed model registry": it hashes the canonical
      # root model_registry.toml against the copy baked into the image. Without
      # a checkout the file is absent on the runner and the step fails.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull amd64 image
        id: pull_amd64
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}

      - name: Assert installed recovery assets
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}"
          docker run --rm -i "$IMAGE" python3 - <<'PY'
          from importlib import resources
          import subprocess

          try:
              recovery_dir = resources.files("mammamiradio").joinpath("assets", "demo", "recovery")
          except ModuleNotFoundError as exc:
              raise SystemExit(f"cannot import mammamiradio package: {exc}") from exc

          try:
              clips = sorted(
                  (clip for clip in recovery_dir.iterdir() if clip.is_file() and clip.name.endswith(".mp3")),
                  key=lambda clip: clip.name,
              )
          except (FileNotFoundError, NotADirectoryError, OSError) as exc:
              raise SystemExit(f"missing recovery asset directory in installed image: {exc}") from exc

          if not clips:
              raise SystemExit("no installed recovery MP3s found under mammamiradio/assets/demo/recovery/")

          serviceable = []
          for clip in clips:
              try:
                  size = len(clip.read_bytes())
              except OSError as exc:
                  raise SystemExit(f"could not read installed recovery MP3 {clip.name}: {exc}") from exc
              if size > 1024:
                  serviceable.append((clip, size))

          if not serviceable:
              names = ", ".join(clip.name for clip in clips)
              raise SystemExit(f"installed recovery MP3s are missing or too small: {names}")

          failures = []
          for clip, size in serviceable:
              try:
                  with resources.as_file(clip) as path:
                      result = subprocess.run(
                          [
                              "ffprobe",
                              "-v",
                              "error",
                              "-select_streams",
                              "a:0",
                              "-show_entries",
                              "stream=codec_type",
                              "-of",
                              "csv=p=0",
                              str(path),
                          ],
                          capture_output=True,
                          text=True,
                          timeout=10,
                      )
              except FileNotFoundError as exc:
                  raise SystemExit("ffprobe is not installed in the image") from exc
              except subprocess.TimeoutExpired:
                  failures.append(f"{clip.name}: ffprobe timed out")
                  continue

              stdout = result.stdout.strip()
              stderr = result.stderr.strip()
              if result.returncode == 0 and "audio" in stdout.lower():
                  print(f"recovery asset OK: {clip.name} ({size} bytes)")
                  raise SystemExit(0)
              failures.append(f"{clip.name}: {stderr or stdout or f'ffprobe exit {result.returncode}'}")

          raise SystemExit(
              "no ffprobe-playable installed recovery MP3 found; "
              + "; ".join(failures)
          )
          PY

      - name: Assert installed model registry
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}"
          EXPECTED="$(sha256sum model_registry.toml | awk '{print $1}')"
          ACTUAL="$(docker run --rm -i "$IMAGE" python3 - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          registry = Path("/app/model_registry.toml")
          if not registry.is_file():
              raise SystemExit("missing /app/model_registry.toml in installed image")
          print(sha256(registry.read_bytes()).hexdigest())
          PY
          )"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Installed model_registry.toml does not match the canonical root registry"
            exit 1
          fi
          echo "Installed model registry matches the canonical root registry"

      - name: Run container smoke test
        if: ${{ always() && steps.pull_amd64.outcome == 'success' }}
        run: |
          # The addon entrypoint (rootfs/run.sh) hardcodes uvicorn to bind
          # 0.0.0.0:8000 — the HA Supervisor ingress contract requires it.
          # The MAMMAMIRADIO_PORT env var is overwritten inside the container,
          # so the host-side port mapping must target the container's real port (8000).
          # Supervisor always sets SUPERVISOR_TOKEN; the addon's tokenless-LAN-admin
          # path requires it (see config._is_addon). Without it the image boots in
          # standalone mode, where binding 0.0.0.0 with no admin token is a fatal
          # config error and uvicorn never starts.
          docker run -d --name mamma-smoke \
            -p 8765:8000 \
            -e LOG_LEVEL=WARNING \
            -e SUPERVISOR_TOKEN=smoke-ci \
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}
          sleep 40
          HEALTH=$(curl -sS --retry 8 --retry-delay 3 --retry-connrefused http://localhost:8765/healthz)
          echo "$HEALTH"
          STATUS=$(echo "$HEALTH" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')
          QE=$(echo "$HEALTH" | python3 -c 'import json,sys; print(float(json.load(sys.stdin).get("queue_empty_elapsed_s",0) or 0))')
          if [ "$STATUS" = "failing" ] || awk "BEGIN{exit !($QE > 30)}"; then
            echo "::error::Smoke failed: status=$STATUS queue_empty_elapsed_s=$QE"
            docker logs mamma-smoke 2>&1 | tail -50
            exit 1
          fi
          echo "Smoke OK: status=$STATUS queue_empty_elapsed_s=$QE"
          docker logs mamma-smoke 2>&1 | tail -50

      - name: Cleanup
        if: always()
        run: docker stop mamma-smoke && docker rm mamma-smoke || true
