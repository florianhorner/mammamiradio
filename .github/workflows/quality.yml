name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "train/**"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # The workflow self-tests resolve HEAD~1 (ancestor cases in the
          # squad-gate and landing-wrapper suites); a depth-1 clone has no
          # parent commit and they die with "Needed a single revision".
          fetch-depth: 2

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Release cooldown gate self-test
        run: bash tests/workflows/test_cooldown_gate.sh

      - name: Cut-edge-release self-test
        run: bash tests/workflows/test_cut_edge_release.sh

      - name: Edge add-on validation self-test
        run: bash tests/workflows/test_validate_addon_edge.sh

      - name: Addon owner-fallback self-test
        run: bash tests/workflows/test_validate_addon_owner.sh

      - name: Pre-ship squad gate self-test
        run: bash tests/workflows/test_preship_squad_gate.sh

      - name: Landing wrapper self-test
        run: bash tests/workflows/test_land_pr.sh

      - name: Dependabot nudge self-test
        run: bash tests/workflows/test_dependabot_nudge.sh

      - name: Merge-gate drift check self-test
        run: bash tests/workflows/test_check_merge_gate.sh

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy mammamiradio/ tests/

      # On every PR: audio delivery invariants (FFmpeg eq count, empty-fallback test, post-restart test)
      - name: Release invariants
        if: github.event_name == 'pull_request'
        run: bash scripts/check-release-invariants.sh

      # On PRs that touch version files: full version-sync check
      # (pyproject.toml ↔ config.yaml ↔ custom_components/mammamiradio/manifest.json ↔ CHANGELOG)
      - name: Version sync check
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE 'pyproject\.toml|ha-addon/mammamiradio/config\.yaml|custom_components/mammamiradio/manifest\.json'; then
            echo "Version file changed — running full pre-release check..."
            bash scripts/pre-release-check.sh
          else
            echo "No version files changed — skipping version sync check."
          fi

      # On PRs: enforce admin panel standards when HTML files changed
      - name: Admin panel standards check
        if: github.event_name == 'pull_request'
        run: bash scripts/check-admin-standards.sh

      # Public changelogs must not contain internal sprint labels, AI tool provenance,
      # or planning vocabulary. See scripts/check-changelog-lint.sh for the pattern set.
      - name: Changelog content lint
        run: bash scripts/check-changelog-lint.sh

      # Catch-all TODO/backlog files are banned (CLAUDE.md). Public work goes to
      # GitHub issues; private strategy goes to a private durable store.
      - name: Backlog-file guard
        run: bash scripts/check-no-backlog-files.sh

      # Enforce per-module coverage floors (no regressions allowed).
      # `coverage-ratchet.py check` runs pytest internally with coverage flags
      # and hard-exits on returncode != 0 (scripts/coverage-ratchet.py:72-78),
      # so it doubles as the test gate — no separate `pytest tests/` step needed.
      - name: Coverage gate (runs pytest + per-module floors)
        env:
          COVERAGE_RATCHET_SNAPSHOT: coverage-ratchet-current.json
        run: python scripts/coverage-ratchet.py check

      - name: Upload coverage ratchet snapshot
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ratchet-current
          path: coverage-ratchet-current.json
          if-no-files-found: error

  coverage-ratchet:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Download coverage ratchet snapshot
        uses: actions/download-artifact@v4
        with:
          name: coverage-ratchet-current

      # On main: auto-ratchet floors up and commit if changed.
      # The coverage numbers come from the read-only quality job artifact, so
      # only this commit step needs a write-capable token.
      - name: Coverage ratchet (auto-update floors)
        env:
          COVERAGE_RATCHET_INPUT: coverage-ratchet-current.json
        run: |
          python scripts/coverage-ratchet.py update

          # If floors changed, commit them back
          if ! git diff --quiet .coverage-floors.json pyproject.toml; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .coverage-floors.json pyproject.toml
            git commit -m "ci: auto-ratchet coverage floors

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push || echo "⚠️  Push blocked by branch protection — coverage floor update skipped. Run 'make coverage-ratchet' and open a PR to apply manually."
          fi
