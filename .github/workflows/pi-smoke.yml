name: Pi Smoke (aarch64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pi-smoke:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run normalizer smoke tests (mocked)
        run: pytest tests/test_normalizer_unit.py tests/test_normalizer_extended.py -v

      - name: Run normalizer real-ffmpeg integration tests
        run: pytest tests/test_normalizer_real_ffmpeg.py -v
