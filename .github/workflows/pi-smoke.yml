name: Pi Smoke (aarch64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "train/**"]

jobs:
  pi-smoke:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install static ffmpeg (arm64) matching HA addon runtime
        # apt on ubuntu-24.04-arm ships ffmpeg 6.x, but the HA addon's Alpine base
        # runs ffmpeg 7.x and the Pi runs the same. John Van Sickle's static
        # release build mirrors the production runtime; accept 7.x or 8.x so the
        # check keeps passing when the release track bumps. BtbN's release build
        # is a fallback because JVS is intermittently unreachable from CI runners
        # (curl 28 connect timeout) — a single-host outage must not fail the gate.
        run: |
          set -euo pipefail
          cd /tmp
          download_jvs() {
            curl -fsSL --connect-timeout 15 --retry 3 --retry-delay 3 --retry-connrefused \
              https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz \
              -o ffmpeg.tar.xz
          }
          download_btbn() {
            curl -fsSL --connect-timeout 15 --retry 3 --retry-delay 3 --retry-connrefused \
              https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-linuxarm64-gpl-7.1.tar.xz \
              -o ffmpeg.tar.xz
          }
          download_jvs || { echo "::warning::John Van Sickle ffmpeg unreachable — falling back to BtbN"; download_btbn; }
          rm -rf ffmpeg-static && mkdir -p ffmpeg-static
          tar -xJf ffmpeg.tar.xz -C ffmpeg-static --strip-components=1
          # JVS keeps the binaries at the tarball root; BtbN nests them under bin/.
          # Locate them rather than hardcoding a layout.
          ff="$(find ffmpeg-static -type f -name ffmpeg | head -1)"
          fp="$(find ffmpeg-static -type f -name ffprobe | head -1)"
          sudo install -m 0755 "$ff" /usr/local/bin/ffmpeg
          sudo install -m 0755 "$fp" /usr/local/bin/ffprobe
          ffmpeg -version | head -1
          ffmpeg -version | head -1 | grep -E 'ffmpeg version (7|n7|8|n8)'

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run normalizer smoke tests (mocked)
        run: pytest tests/audio/test_normalizer_unit.py tests/audio/test_normalizer_extended.py -v

      - name: Run normalizer real-ffmpeg integration tests
        run: pytest tests/audio/test_normalizer_real_ffmpeg.py -m requires_ffmpeg -v

      - name: Cold-launch first-byte smoke (process-start to audio)
        # The perf smoke assumes an already-running station; this launches a real
        # cold uvicorn on temp cache/tmp and asserts a connecting listener hears
        # audio within the 1-2s INSTANT AUDIO promise (default <= 2s), the
        # add-on-restart reality the perf smoke never measured.
        # Invoke the script directly: this job installs into the system Python,
        # so `make launch-smoke` (which uses .venv/bin/python) would not resolve.
        run: python scripts/ha-green-launch-smoke.py
