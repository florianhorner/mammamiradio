# Per-repo includer for the engineering-standards reusable commit-lint workflow.
# Canonical workflow: https://github.com/florianhorner/engineering-standards/blob/main/.github/workflows/commit-lint-reusable.yml
# Pin to a SHA in production; d2824d4cc7630a80efae3fc273b273f124a5e19a is the bootstrap placeholder until bootstrap-repo.sh resolves the actual SHA.
name: commit-lint

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  commit-lint:
    uses: florianhorner/engineering-standards/.github/workflows/commit-lint-reusable.yml@d2824d4cc7630a80efae3fc273b273f124a5e19a
