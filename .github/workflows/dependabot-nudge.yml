name: Dependabot Nudge

# Branch protection requires branches to be up to date before merging, but
# Dependabot only rebases PRs with conflicts — merely-behind bot PRs would
# deadlock with their armed auto-merge (see scripts/nudge-dependabot-rebase.sh
# for the full story). After each push to main, ask Dependabot to rebase its
# behind PRs; its own push retriggers CI normally.

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  nudge:
    if: github.repository_owner == 'florianhorner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Nudge behind Dependabot PRs
        run: bash scripts/nudge-dependabot-rebase.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
