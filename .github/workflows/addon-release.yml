name: Release HA Addon

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Prevent racing on rapid re-tags or manual re-triggers.
concurrency:
  group: addon-release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/mammamiradio-addon

jobs:
  pre-flight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.semver.outputs.version }}
      publish_latest: ${{ steps.latest.outputs.publish_latest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Require tag ref
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Stable add-on releases must run from a tag ref, not ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "Tag ref confirmed: ${GITHUB_REF_NAME}"

      - name: Validate semver tag format
        id: semver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' does not match vX.Y.Z semver format — only exact releases are stable-published"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG → version: $VERSION"

      - name: Check latest stable tag
        id: latest
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          git fetch --force --tags origin 'refs/tags/v*:refs/tags/v*'
          LATEST_STABLE="$(git tag -l 'v*' \
            | sed 's/^v//' \
            | awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ { print }' \
            | sort -V \
            | tail -1)"
          if [ "$LATEST_STABLE" = "$VERSION" ]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
            echo "Current tag is the newest stable version: $VERSION"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
            echo "Current tag $VERSION is older than newest stable version $LATEST_STABLE; :latest will not be moved"
          fi

      - name: Validate tag matches config.yaml version
        run: |
          CONFIG_VERSION=$(grep '^version:' ha-addon/mammamiradio/config.yaml | awk '{print $2}' | tr -d '"')
          TAG_VERSION="${{ steps.semver.outputs.version }}"
          if [ "$CONFIG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::config.yaml version ($CONFIG_VERSION) does not match tag ($TAG_VERSION) — bump version in both files before tagging"
            exit 1
          fi
          echo "Version match confirmed: $CONFIG_VERSION"

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Require prebuilt SHA images and check stable tags
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          for ARCH in amd64 aarch64; do
            SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${ARCH}:${{ github.sha }}"
            VERSION_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${ARCH}:${VERSION}"

            if ! docker buildx imagetools inspect "$SHA_TAG" > /dev/null 2>&1; then
              echo "::error::Missing $SHA_TAG. Tag the already-built version-bump commit after addon-build.yml is green."
              exit 1
            fi
            SHA_DIGEST="$(printf 'sha256:%s' "$(docker buildx imagetools inspect "$SHA_TAG" --raw | sha256sum | awk '{print $1}')")"
            echo "Prebuilt SHA image found: $SHA_TAG ($SHA_DIGEST)"

            if docker buildx imagetools inspect "$VERSION_TAG" > /dev/null 2>&1; then
              VERSION_DIGEST="$(printf 'sha256:%s' "$(docker buildx imagetools inspect "$VERSION_TAG" --raw | sha256sum | awk '{print $1}')")"
              if [ "$VERSION_DIGEST" != "$SHA_DIGEST" ]; then
                echo "::error::Tag $VERSION_TAG already exists but does not match $SHA_TAG — delete the bad registry tag manually before retrying"
                exit 1
              fi
              echo "Existing version tag matches $SHA_TAG; rerun recovery is allowed for $ARCH"
            else
              echo "Stable version tag is not published yet: $VERSION_TAG"
            fi
          done

  smoke-prebuilt:
    runs-on: ubuntu-latest
    needs: pre-flight
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull amd64 SHA image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}

      - name: Run SHA image smoke test
        run: |
          set -euo pipefail
          # Gate stable publishing on the exact image built by addon-build.yml.
          docker run -d --name mamma-smoke \
            -p 8765:8000 \
            -e LOG_LEVEL=WARNING \
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ github.sha }}
          sleep 40
          HEALTH=$(curl -sS --retry 8 --retry-delay 3 --retry-connrefused http://localhost:8765/healthz)
          echo "$HEALTH"
          STATUS=$(echo "$HEALTH" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')
          QE=$(echo "$HEALTH" | python3 -c 'import json,sys; print(float(json.load(sys.stdin).get("queue_empty_elapsed_s",0) or 0))')
          if [ "$STATUS" = "failing" ] || awk "BEGIN{exit !($QE > 30)}"; then
            echo "::error::Smoke failed: status=$STATUS queue_empty_elapsed_s=$QE"
            docker logs mamma-smoke 2>&1 | tail -50
            exit 1
          fi
          echo "Smoke OK: status=$STATUS queue_empty_elapsed_s=$QE"
          docker logs mamma-smoke 2>&1 | tail -50

      - name: Cleanup
        if: always()
        run: docker stop mamma-smoke && docker rm mamma-smoke || true

  promote:
    runs-on: ubuntu-latest
    needs: [pre-flight, smoke-prebuilt]
    if: github.repository == 'florianhorner/mammamiradio'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote SHA image to stable tags
        run: |
          VERSION="${{ needs.pre-flight.outputs.version }}"
          SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ github.sha }}"
          VERSION_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${VERSION}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}:latest"

          SHA_DIGEST="$(printf 'sha256:%s' "$(docker buildx imagetools inspect "$SHA_TAG" --raw | sha256sum | awk '{print $1}')")"
          if docker buildx imagetools inspect "$VERSION_TAG" > /dev/null 2>&1; then
            VERSION_DIGEST="$(printf 'sha256:%s' "$(docker buildx imagetools inspect "$VERSION_TAG" --raw | sha256sum | awk '{print $1}')")"
            if [ "$VERSION_DIGEST" != "$SHA_DIGEST" ]; then
              echo "::error::Refusing to overwrite $VERSION_TAG ($VERSION_DIGEST) with $SHA_TAG ($SHA_DIGEST)"
              exit 1
            fi
            echo "Version tag already matches $SHA_TAG; leaving immutable tag in place"
          else
            docker buildx imagetools create --prefer-index=false --tag "$VERSION_TAG" "$SHA_TAG"
            echo "Published $VERSION_TAG from $SHA_TAG"
          fi

          # Re-verify this tag is still the newest stable before updating :latest.
          # Closes the TOCTOU window: a newer tag may have been promoted while this
          # run was in-progress since publish_latest was computed in pre-flight.
          PUBLISH_LATEST="${{ needs.pre-flight.outputs.publish_latest }}"
          if [ "$PUBLISH_LATEST" = "true" ]; then
            git fetch --force --tags origin 'refs/tags/v*:refs/tags/v*'
            CURRENT_LATEST="$(git tag -l 'v*' \
              | sed 's/^v//' \
              | awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ { print }' \
              | sort -V \
              | tail -1)"
            if [ "$CURRENT_LATEST" != "$VERSION" ]; then
              echo "Tag $VERSION is no longer the newest stable ($CURRENT_LATEST was published concurrently); skipping :latest update."
              PUBLISH_LATEST="false"
            fi
          fi
          if [ "$PUBLISH_LATEST" = "true" ]; then
            docker buildx imagetools create --prefer-index=false --tag "$LATEST_TAG" "$SHA_TAG"
            echo "Updated $LATEST_TAG from $SHA_TAG"
          else
            echo "Skipping $LATEST_TAG because $VERSION is not the newest stable tag"
          fi

  smoke:
    runs-on: ubuntu-latest
    needs: [pre-flight, promote]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull amd64 release image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ needs.pre-flight.outputs.version }}

      - name: Run release image smoke test
        run: |
          set -euo pipefail
          docker run -d --name mamma-smoke \
            -p 8765:8000 \
            -e LOG_LEVEL=WARNING \
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${{ needs.pre-flight.outputs.version }}
          sleep 40
          HEALTH=$(curl -sS --retry 8 --retry-delay 3 --retry-connrefused http://localhost:8765/healthz)
          echo "$HEALTH"
          STATUS=$(echo "$HEALTH" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')
          QE=$(echo "$HEALTH" | python3 -c 'import json,sys; print(float(json.load(sys.stdin).get("queue_empty_elapsed_s",0) or 0))')
          if [ "$STATUS" = "failing" ] || awk "BEGIN{exit !($QE > 30)}"; then
            echo "::error::Smoke failed: status=$STATUS queue_empty_elapsed_s=$QE"
            docker logs mamma-smoke 2>&1 | tail -50
            exit 1
          fi
          echo "Smoke OK: status=$STATUS queue_empty_elapsed_s=$QE"
          docker logs mamma-smoke 2>&1 | tail -50

      - name: Cleanup
        if: always()
        run: docker stop mamma-smoke && docker rm mamma-smoke || true
