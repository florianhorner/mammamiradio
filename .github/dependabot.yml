version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-tools:
        patterns: ["ruff", "mypy", "pytest*"]
      core:
        patterns: ["fastapi", "uvicorn", "anthropic", "spotipy"]
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "ci"
