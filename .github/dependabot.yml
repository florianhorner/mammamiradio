version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-tools:
        patterns: ["ruff", "mypy", "pytest*"]
      core:
        patterns: ["fastapi", "uvicorn", "anthropic", "spotipy"]
      pydantic:
        patterns: ["pydantic", "pydantic-core", "pydantic-settings"]
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"
