version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-tools:
        patterns: ["ruff", "mypy", "pytest*"]
      core:
        patterns: ["fastapi", "uvicorn", "anthropic", "spotipy"]
      pydantic:
        patterns: ["pydantic", "pydantic-core", "pydantic-settings"]
    ignore:
      # pydantic pins an exact pydantic-core; bumping pydantic-core on its own makes
      # the hash-locked requirements.txt unsatisfiable (the 2.47.0 vs 2.13.4 incident).
      # Let pydantic-core move only when pydantic does.
      - dependency-name: "pydantic-core"
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"
