repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: commit-msg-conventional
        name: conventional commit message
        entry: scripts/check-commit-msg.sh
        language: script
        stages: [commit-msg]
        always_run: true

      - id: version-sync
        name: config.yaml/pyproject.toml version sync
        entry: scripts/check-version-sync.sh
        language: script
        stages: [pre-commit]
        always_run: true
