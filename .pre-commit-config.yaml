repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: ha-addon-local-build
        name: ha-addon local build
        entry: scripts/test-addon-local.sh
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
        files: ^(ha-addon/mammamiradio/|mammamiradio/|pyproject\.toml|radio\.toml|\.github/workflows/addon-build\.yml)

