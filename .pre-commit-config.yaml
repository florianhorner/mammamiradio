repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: changelog-sync
        name: changelog sync on version bump
        entry: scripts/check-changelog-sync.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ha-addon-local-build
        name: ha-addon local build
        entry: scripts/test-addon-local.sh
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
        files: ^(ha-addon/mammamiradio/|mammamiradio/|pyproject\.toml|radio\.toml|\.github/workflows/addon-build\.yml)
